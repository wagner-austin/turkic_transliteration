name: Sync to Hugging Face Space

# Runs on any push to main that touches source or packaging metadata. The
# workflow keeps the Hugging Face Space's ``requirements.txt`` in lockstep
# with the version declared in ``pyproject.toml`` — every release then
# needs only a bump in pyproject and a push. No manual demo edits.

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  sync-space:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Wait for PyPI to publish the new version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for attempt in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://pypi.org/pypi/turkic-translit/$VERSION/json")
            if [ "$status" = "200" ]; then
              echo "PyPI has turkic-translit==$VERSION available."
              exit 0
            fi
            echo "Attempt $attempt/30: PyPI has not yet published $VERSION (HTTP $status). Retrying in 20s."
            sleep 20
          done
          echo "ERROR: turkic-translit==$VERSION was not visible on PyPI after 10 minutes." >&2
          exit 1

      - name: Clone Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          git clone "https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/turkic-transliteration-demo" hf-space
          cd hf-space
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump turkic-translit pin in requirements.txt
        working-directory: hf-space
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ ! -f requirements.txt ]; then
            echo "ERROR: requirements.txt not found on the Space." >&2
            exit 1
          fi
          # Replace `turkic-translit[extras]==X.Y.Z` with the new version.
          # Preserves the extras marker so the UI extra stays in place.
          sed -i -E "s|^(turkic-translit(\[[^]]+\])?)==[0-9]+(\.[0-9]+)*(\.[0-9A-Za-z_-]+)?|\1==${VERSION}|" requirements.txt
          echo "requirements.txt after bump:"
          grep -E '^turkic-translit' requirements.txt

      - name: Append sync marker to README
        working-directory: hf-space
        run: |
          echo "" >> README.md
          echo "<!-- Last synced: $(date -u +"%Y-%m-%d %H:%M:%S UTC") from main repo version ${{ steps.version.outputs.version }} -->" >> README.md

      - name: Commit and push
        working-directory: hf-space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No effective changes to commit; creating empty commit to trigger rebuild."
            git commit --allow-empty -m "Trigger rebuild for PyPI version ${{ steps.version.outputs.version }}"
          else
            git add requirements.txt README.md
            git commit -m "Sync: bump turkic-translit==${{ steps.version.outputs.version }}"
          fi
          git push origin main
          echo "Successfully pushed to Hugging Face Space; rebuild will follow automatically."
